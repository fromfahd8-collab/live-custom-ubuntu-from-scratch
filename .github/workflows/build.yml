name: Build Win1 ISO for KSO
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools wget imagemagick git

      - name: Clone Original Ubuntu Builder
        run: |
          git clone https://github.com/mvallim/live-custom-ubuntu-from-scratch.git builder

      - name: Nuke All Root Checks + Setup KSO
        working-directory: ./builder
        run: |
          # 1. نمسح كل checks الروت من كل السكريبتات
          find . -type f -name "*.sh" -exec sed -i '/EUID/d' {} \;
          find . -type f -name "*.sh" -exec sed -i '/should not be run as/d' {} \;
          find . -type f -name "*.sh" -exec sed -i 's/set -e/set -e/g' {} \;
          find . -type f -name "*.sh" -exec sed -i 's/exit 1/return 0/g' {} \;
          
          # 2. نصلح الـ umount في كل حتة
          find . -type f -exec sed -i 's/umount /umount || true #/g' {} \;
          find . -type f -exec sed -i 's/umount -lf /umount -lf || true #/g' {} \;
          
          # 3. البراندنج بتاعك
          sed -i 's/LIVE_CD_LABEL="Custom Ubuntu"/LIVE_CD_LABEL="برمجة عبد الله و عبد الرحمن هاني [ kso ]"/g' scripts/build.sh
          chmod +x scripts/build.sh
          mkdir -p config
          tee config/chroot_commands.sh > /dev/null << 'EOF'
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y icewm xserver-xorg xinit imagemagick x11-xserver-utils
          mkdir -p /etc/skel/.icewm
          cat > /etc/skel/.icewm/preferences << 'PREF'
          ColorActiveTitleBar="0 0 128"
          ColorNormalTitleBar="128 128 128"
          ColorDefaultTaskBar="192 192 192"
          DesktopBackgroundColor="0 0 128"
          TaskBarShowClock=0
          TaskBarShowAPMStatus=0
          TaskBarShowMailboxStatus=0
          ShowTaskBar=1
          PREF
          convert -size 1024x768 xc:#000080 -fill white -pointsize 35 -gravity center -annotate +0+0 'برمجة عبد الله و عبد الرحمن هاني [ kso ]' /usr/share/backgrounds/win1.png
          echo 'DesktopBackgroundImage="/usr/share/backgrounds/win1.png"' >> /etc/skel/.icewm/preferences
          echo '[ kso ] OS' > /etc/hostname
          echo '[ kso ] OS - Windows 1 \n \l' > /etc/issue
          sed -i 's/Ubuntu/[ kso ] OS/g' /etc/os-release
          echo 'exec icewm-session' > /etc/skel/.xinitrc
          systemctl set-default graphical.target
          EOF
          chmod +x config/chroot_commands.sh

      - name: Build ISO
        working-directory: ./builder
        run: |
          # نشغله عادي من غير sudo عشان عدينا الـ check
          ./scripts/build.sh - || echo "Build script ended"
          
      - name: Find ISO File
        run: |
          echo "=== بدور على الأيزو في كل حتة ==="
          sudo find ./builder -name "*.iso" -type f -ls || true
          echo "=== اخر 50 سطر من اللوج ==="
          sudo tail -50 ./builder/build.log || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kso-win1-iso
          path: |
            builder/**/*.iso
            builder/*.iso
          if-no-files-found: warn
          retention-days: 5
