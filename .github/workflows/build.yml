name: Build Win1 ISO for KSO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y p7zip-full wimtools aria2 curl cabextract genisoimage

      - name: Download Windows 11 ISO - Fido Script
        run: |
          # ده بيجيب لينك رسمي من مايكروسوفت اوتوماتيك
          wget https://github.com/pbatard/Fido/raw/master/Fido.ps1
          sudo apt install -y powershell
          pwsh -Command "& {./Fido.ps1 -Win 11 -Rel 23H2 -Ed Pro -Lang Arabic -Arch x64 -GetUrl }" > win_url.txt
          cat win_url.txt
          aria2c -x16 -s16 -o win11.iso $(cat win_url.txt)

      - name: Extract ISO
        run: 7z x win11.iso -oiso_extract

      - name: Mount install.wim
        run: |
          mkdir wim_mount
          wimlib-imagex mount iso_extract/sources/install.wim 1 wim_mount

      - name: Mount boot.wim for Boot Screen Edit
        run: |
          mkdir boot_mount
          wimlib-imagex mount iso_extract/sources/boot.wim 2 boot_mount

      - name: Team KSO Branding - البوت + السيستم
        run: |
          # === 1. تعديل شاشة البوت ===
          sed -i 's/Microsoft Corporation/Team KSO - برمجة عبد الله و عبد الرحمن هاني/g' boot_mount/Windows/Boot/Resources/en-US/bootres.dll.mui
          sed -i 's/Microsoft Corporation/Team KSO - عبد الله و عبد الرحمن هاني/g' boot_mount/Windows/Boot/Resources/ar-SA/bootres.dll.mui

          # === 2. تعديل install.wim ===
          rm -rf wim_mount/Windows/SystemApps/Microsoft.MicrosoftEdge_8wekyb3d8bbwe
          rm -rf wim_mount/Windows/SystemApps/Microsoft.Windows.Cortana_cw5n1h2txyewy

          sed -i 's/Microsoft Windows/Team KSO Windows/g' wim_mount/Windows/System32/en-US/winbrand.dll.mui
          sed -i 's/Microsoft Windows/Team KSO Windows/g' wim_mount/Windows/System32/ar-SA/winbrand.dll.mui

          mkdir -p wim_mount/Windows/System32/oobe/info
          cat > wim_mount/Windows/System32/oobe/info/oeminfo.ini << 'EOF'
          [General]
          Manufacturer=Team KSO
          Model=KSO Win1 Edition
          SubModel=برمجة عبد الله و عبد الرحمن هاني [ KSO ]
          SupportURL=https://github.com/fromfahd8
          EOF

          mkdir -p wim_mount/Users/Default/Desktop
          echo "Team KSO Edition" > wim_mount/Users/Default/Desktop/KSO.txt
          echo "برمجة: عبد الله و عبد الرحمن هاني [ KSO ]" >> wim_mount/Users/Default/Desktop/KSO.txt

      - name: Commit Changes
        run: |
          wimlib-imagex unmount boot_mount --commit
          wimlib-imagex unmount wim_mount --commit

      - name: Rebuild ISO
        run: |
          genisoimage -iso-level 4 -udf -r -D -N -joliet -relaxed-filenames \
          -b boot/etfsboot.com -no-emul-boot -boot-load-size 8 -hide boot.catalog \
          -eltorito-alt-boot -no-emul-boot -b efi/microsoft/boot/efisys.bin \
          -o kso-win1.iso iso_extract

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kso-win1-Abdullah-Abdelrahman
          path: kso-win1.iso
          retention-days: 5
