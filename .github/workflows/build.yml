name: Build Win1 ISO for KSO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04-4core
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools genisoimage p7zip-full wget

      - name: Clone Original Ubuntu Builder
        run: |
          git clone https://github.com/mvallim/live-custom-ubuntu-from-scratch.git
          cp -r live-custom-ubuntu-from-scratch/* .

      - name: Nuke All Root Checks + Setup KSO Team
        run: |
          # شيل فحص الروت
          find . -type f -exec sed -i 's/\[ "$(id -u)" -eq 0 \]//g' {} +
          find . -type f -exec sed -i 's/\[ "$(id -u)" -ne 0 \]//g' {} +
          
          # عدل الاسم وبيانات المبرمجين
          sed -i 's/Ubuntu/KSO-Win1/g' config/*
          echo "KSO-Win1" > etc/hostname
          
          # حط أساميكم في ملفات النظام
          echo "KSO-Win1 1.0 \n \l" > etc/issue
          echo "برمجة: عبد الله و عبد الرحمن هاني [KSO]" >> etc/issue
          echo "" >> etc/issue
          
          # ملف os-release عشان يظهر في neofetch
          echo 'NAME="KSO-Win1"' > etc/os-release
          echo 'VERSION="1.0"' >> etc/os-release
          echo 'ID=kso' >> etc/os-release
          echo 'PRETTY_NAME="KSO-Win1 1.0 - برمجة عبد الله و عبد الرحمن هاني"' >> etc/os-release
          echo 'HOME_URL="https://github.com"' >> etc/os-release
          
          # رسالة ترحيب في الترمنال
          mkdir -p etc/skel
          echo 'echo "=================================="' >> etc/skel/.bashrc
          echo 'echo "   مرحباً بك في KSO-Win1 v1.0"' >> etc/skel/.bashrc
          echo 'echo "   برمجة: عبد الله و عبد الرحمن هاني [KSO]"' >> etc/skel/.bashrc
          echo 'echo "=================================="' >> etc/skel/.bashrc
          
      - name: Build ISO - 4 Cores
        run: |
          chmod +x build.sh
          export JOBS=4
          sudo -E ./build.sh

      - name: Find ISO File
        id: find_iso
        run: |
          ISO_PATH=$(find . -name "*.iso" | head -1)
          echo "iso_path=$ISO_PATH" >> $GITHUB_OUTPUT
          ls -lh $ISO_PATH

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kso-win1-iso
          path: ${{ steps.find_iso.outputs.iso_path }}
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: KSO-Win1 v1.0 - Team KSO
          body: |
            نظام KSO-Win1 خفيف وسريع
            برمجة: عبد الله و عبد الرحمن هاني [KSO]
          files: ${{ steps.find_iso.outputs.iso_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
