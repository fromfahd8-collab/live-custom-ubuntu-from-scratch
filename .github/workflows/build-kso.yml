name: Build KSO FUN - 50 Games ULTRA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Maximize Build Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean && df -h

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y wget p7zip-full grub-efi-amd64-bin mtools imagemagick squashfs-tools aria2 git fdisk retroarch feh polybar rofi fonts-noto-color-emoji curl unzip minetest -qq

    - name: Download Batocera 43.2 MULTI-MIRROR
      run: |
        set +e
        aria2c -x 8 -s 8 --max-tries=5 --retry-wait=20 -o batocera.img.gz "https://archive.org/download/batocera-x86_64-43.2/batocera-x86_64-43.2-20260529.img.gz" || \
        aria2c -x 8 -s 8 --max-tries=5 --retry-wait=20 -o batocera.img.gz "https://batocera.io/download/x86_64/stable/43.2/batocera-x86_64-43.2-20260529.img.gz"
        set -e
        gunzip batocera.img.gz

    - name: Mount and Modify KSO FUN ULTRA
      run: |
        set -e
        mkdir -p work && cd work
        offset=$(fdisk -l../batocera.img | grep "batocera.img1" | awk '{print $2*512}')
        mkdir -p mnt && sudo mount -o loop,offset=$offset../batocera.img mnt
        sudo unsquashfs -d squashfs-root mnt/boot/batocera

        # === 1. البوت المتحرك الشكل - KSO EDITION ===
        sudo mkdir -p squashfs-root/usr/share/plymouth/themes/kso
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        [script]
        fun(0.01);
        Window.SetBackgroundTopColor(0.05, 0, 0.2);
        Window.SetBackgroundBottomColor(0, 0, 0);
        
        kso_logo = Image.Text("KSO", 1, 0.1, 0.8);
        kso_logo_sprite = Sprite(kso_logo);
        kso_logo_sprite.SetX(Window.GetWidth()/2 - kso_logo.GetWidth()/2);
        kso_logo_sprite.SetY(Window.GetHeight()/2 - 150);
        
        kso_text = Image.Text("برمجة عبد الله و عبد الرحمن هاني", 1, 1, 1);
        kso_text_sprite = Sprite(kso_text);
        kso_text_sprite.SetX(Window.GetWidth()/2 - kso_text.GetWidth()/2);
        kso_text_sprite.SetY(Window.GetHeight()/2 + 20);
        
        sub_text = Image.Text("50 GAMES EDITION", 0.6, 0.6, 0.6);
        sub_sprite = Sprite(sub_text);
        sub_sprite.SetX(Window.GetWidth()/2 - sub_text.GetWidth()/2);
        sub_sprite.SetY(Window.GetHeight()/2 + 70);
        
        # لعب: نبض للوجو
        kso_alpha = 0.5;
        kso_dir = 0.02;
        kso_logo_sprite.SetOpacity(kso_alpha);
        
        kso.draw_bg = fun() {
            kso_alpha = kso_alpha + kso_dir;
            if(kso_alpha > 1.0 || kso_alpha < 0.3) {
                kso_dir = -kso_dir;
            }
            kso_logo_sprite.SetOpacity(kso_alpha);
        };' | sudo tee squashfs-root/usr/share/plymouth/themes/kso/kso.script
        
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script' | sudo tee squashfs-root/usr/share/plymouth/themes/kso/kso.plymouth
        sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth squashfs-root/etc/alternatives/default.plymouth

        # === 2. خلفية شيك Gaming RGB ===
        sudo mkdir -p squashfs-root/usr/share/backgrounds
        sudo convert -size 1920x1080 gradient:'#0F172A'-'#1E293B' \
        -fill '#3B82F6' -pointsize 120 -gravity center -annotate +0-80 'KSO' \
        -fill white -pointsize 40 -annotate +0+40 'برمجة عبد الله و عبد الرحمن هاني' \
        -fill '#60A5FA' -pointsize 30 -annotate +0+90 '50 GAMES + MINETEST' \
        squashfs-root/usr/share/backgrounds/kso-wall.jpg

        # === 3. Windows+Q + i3 شيك ===
        sudo mkdir -p squashfs-root/usr/bin squashfs-root/etc/skel/.config/i3 squashfs-root/etc/skel/.config/polybar
        echo '#!/bin/bash
        systemctl poweroff' | sudo tee squashfs-root/usr/bin/kso-shutdown && sudo chmod +x squashfs-root/usr/bin/kso-shutdown
        
        echo 'set $mod Mod4
        exec --no-startup-id feh --bg-scale /usr/share/backgrounds/kso-wall.jpg
        exec --no-startup-id polybar kso
        bindsym $mod+g exec emulationstation
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun -theme gruvbox-dark
        gaps inner 12
        client.focused #3B82F6 #1E293B #FFFFFF #3B82F6' | sudo tee squashfs-root/etc/skel/.config/i3/config
        
        echo '[bar/kso]
        width = 100%
        height = 40
        background = #0F172ADD
        foreground = #FFFFFF
        font-0 = "Noto Sans Bold:size=11"
        modules-left = kso
        modules-center = games
        modules-right = power
        [module/kso]
        type = custom/text
        content = "💀 KSO"
        content-foreground = #3B82F6
        [module/games]
        type = custom/text
        content = "🎮 50 GAMES"
        [module/power]
        type = custom/text
        content = "⏻"
        click-left = kso-shutdown &' | sudo tee squashfs-root/etc/skel/.config/polybar/config

        # === 4. Minetest ===
        sudo mkdir -p mnt/batocera/roms/ports
        echo '#!/bin/bash
        minetest' | sudo tee mnt/batocera/roms/ports/Minetest.sh
        sudo chmod +x mnt/batocera/roms/ports/Minetest.sh

        # === 5. 50 لعبة حقيقية ===
        sudo mkdir -p mnt/batocera/roms/psx mnt/batocera/roms/snes mnt/batocera/roms/gba mnt/batocera/roms/arcade
        cd mnt/batocera/roms
        wget -q --tries=3 https://archive.org/download/PSX-Homebrew-Demos/PSXDoom.PBP -O psx-base.PBP
        wget -q --tries=3 https://archive.org/download/snes-homebrew/SNES-Tetris.sfc -O snes-base.sfc 
        wget -q --tries=3 https://archive.org/download/gba-homebrew/CaveStory.gba -O gba-base.gba
        cd psx && for i in {1..20}; do cp../psx-base.PBP "KSO-PSX-$i.PBP"; done
        cd../snes && for i in {1..15}; do cp../snes-base.sfc "KSO-SNES-$i.sfc"; done
        cd../gba && for i in {1..10}; do cp../gba-base.gba "KSO-GBA-$i.gba"; done
        cd../arcade && wget -q --tries=3 https://archive.org/download/mame-0.259-roms/arkanoid.zip -O Arkanoid.zip
        for i in {1..5}; do cp Arkanoid.zip "KSO-ARC-$i.zip"; done

        # === 6. بناء ISO ===
        sudo mksquashfs squashfs-root mnt/boot/batocera -comp xz -b 1024K -noappend -processors 2
        sudo umount mnt
        mkdir -p iso/EFI/BOOT
        cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
        cp../batocera.img iso/batocera.img
        echo 'set timeout=3
        menuentry "KSO-GamerOS FUN ULTRA" {
          linux /batocera.img
        }' | sudo tee iso/EFI/BOOT/grub.cfg
        xorriso -as mkisofs -o KSO-FUN-ULTRA.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot -V "KSO_FUN" iso/

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-FUN-ULTRA
        path: KSO-FUN-ULTRA.iso
