name: Build KSO FUN - 11 GAMES V12 BYPASS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Maximize Build Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean && df -h

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y wget p7zip-full grub-efi-amd64-bin mtools imagemagick squashfs-tools aria2 git fdisk retroarch feh polybar rofi fonts-noto-color-emoji curl unzip minetest -qq

    - name: DOWNLOAD BATOCERA 42.1 BYPASS
      run: |
        set -e
        echo "بننزل باتوسيرا 42.1 بغش..."
        aria2c -x 16 -s 16 --max-tries=10 --retry-wait=30 --user-agent="Mozilla/5.0 Chrome/120.0" --referer="https://www.google.com" -o batocera.img.gz "https://mirror.math.princeton.edu/pub/batocera/x86_64/stable/42.1/batocera-x86_64-42.1-20250519.img.gz"
        gunzip batocera.img.gz
        ls -lh batocera.img

    - name: Mount and Modify KSO FUN LIGHT
      run: |
        set -e
        mkdir -p work && cd work
        offset=$(fdisk -l ../batocera.img | grep "batocera.img1" | awk '{print $2*512}')
        mkdir -p mnt && sudo mount -o loop,offset=$offset ../batocera.img mnt
        sudo unsquashfs -d squashfs-root mnt/boot/batocera

        sudo mkdir -p squashfs-root/usr/share/plymouth/themes/kso
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        [script]
        fun(0.01);
        Window.SetBackgroundTopColor(0.05, 0, 0.2);
        Window.SetBackgroundBottomColor(0, 0, 0);
        kso_logo = Image.Text("KSO", 1, 0.1, 0.8);
        kso_logo_sprite = Sprite(kso_logo);
        kso_logo_sprite.SetX(Window.GetWidth()/2 - kso_logo.GetWidth()/2);
        kso_logo_sprite.SetY(Window.GetHeight()/2 - 150);
        kso_text = Image.Text("برمجة عبد الله و عبد الرحمن هاني", 1, 1, 1);
        kso_text_sprite = Sprite(kso_text);
        kso_text_sprite.SetX(Window.GetWidth()/2 - kso_text.GetWidth()/2);
        kso_text_sprite.SetY(Window.GetHeight()/2 + 20);
        kso_alpha = 0.5; kso_dir = 0.02; kso_logo_sprite.SetOpacity(kso_alpha);
        kso.draw_bg = fun() { kso_alpha = kso_alpha + kso_dir; if(kso_alpha > 1.0 || kso_alpha < 0.3) { kso_dir = -kso_dir; } kso_logo_sprite.SetOpacity(kso_alpha); };' | sudo tee squashfs-root/usr/share/plymouth/themes/kso/kso.script
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        ModuleName=script' | sudo tee squashfs-root/usr/share/plymouth/themes/kso/kso.plymouth
        sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth squashfs-root/etc/alternatives/default.plymouth

        sudo mkdir -p squashfs-root/usr/share/backgrounds
        sudo convert -size 1920x1080 xc:'#0F172A' -fill '#3B82F6' -pointsize 120 -gravity center -annotate +0-80 'KSO' -fill white -pointsize 40 -annotate +0+40 'برمجة عبد الله و عبد الرحمن هاني' -fill '#60A5FA' -pointsize 30 -annotate +0+90 '11 GAMES + MINETEST' squashfs-root/usr/share/backgrounds/kso-wall.jpg

        sudo mkdir -p squashfs-root/usr/bin squashfs-root/etc/skel/.config/i3
        echo '#!/bin/bash
        systemctl poweroff' | sudo tee squashfs-root/usr/bin/kso-shutdown && sudo chmod +x squashfs-root/usr/bin/kso-shutdown
        echo 'set $mod Mod4
        exec --no-startup-id feh --bg-scale /usr/share/backgrounds/kso-wall.jpg
        exec --no-startup-id xsetroot -cursor_name left_ptr
        bindsym $mod+g exec emulationstation
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun -theme gruvbox-dark
        mouse mod1 button1 move
        gaps inner 8
        client.focused #3B82F6 #1E293B #FFFFFF #3B82F6' | sudo tee squashfs-root/etc/skel/.config/i3/config

        sudo mkdir -p mnt/batocera/roms/ports squashfs-root/etc/skel/.minetest
        echo 'video_driver = opengl
        enable_shaders = false
        enable_particles = false
        enable_clouds = false
        view_bobbing_amount = 0.0
        fps_max = 60
        render_distance = 50' | sudo tee squashfs-root/etc/skel/.minetest/minetest.conf
        echo '#!/bin/bash
        minetest' | sudo tee mnt/batocera/roms/ports/Minetest.sh
        sudo chmod +x mnt/batocera/roms/ports/Minetest.sh

        sudo mkdir -p mnt/batocera/roms/psx mnt/batocera/roms/snes mnt/batocera/roms/gba mnt/batocera/roms/arcade
        cd mnt/batocera/roms
        cd psx && wget -q --tries=3 https://archive.org/download/PSX-Homebrew-Demos/PSXDoom.PBP -O Doom.PBP && wget -q --tries=3 https://archive.org/download/psx-homebrew/DukeNukem.PBP -O Duke.PBP && wget -q --tries=3 https://archive.org/download/psx-homebrew/Wolf3D.PBP -O Wolf3D.PBP
        cd ../snes && wget -q --tries=3 https://archive.org/download/snes-homebrew/SNES-Tetris.sfc -O Tetris.sfc && wget -q --tries=3 https://archive.org/download/snes-homebrew/SuperMarioWorld.sfc -O Mario.sfc && wget -q --tries=3 https://archive.org/download/snes-homebrew/StreetFighter2.sfc -O SF2.sfc
        cd ../gba && wget -q --tries=3 https://archive.org/download/gba-homebrew/CaveStory.gba -O CaveStory.gba && wget -q --tries=3 https://archive.org/download/gba-homebrew/2004-mine.gba -O Mine.gba
        cd ../arcade && wget -q --tries=3 https://archive.org/download/mame-0.259-roms/arkanoid.zip -O Arkanoid.zip && wget -q --tries=3 https://archive.org/download/mame-0.259-roms/pacman.zip -O Pacman.zip

        sudo mksquashfs squashfs-root mnt/boot/batocera -comp xz -Xbcj x86 -b 1024K -noappend -processors 2
        sudo umount mnt
        mkdir -p iso/EFI/BOOT
        cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
        cp ../batocera.img iso/batocera.img
        echo 'set timeout=3
        menuentry "KSO-GamerOS 11 GAMES" {
          linux /batocera.img
        }' | sudo tee iso/EFI/BOOT/grub.cfg
        xorriso -as mkisofs -o KSO-FUN-11GAMES.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot -V "KSO_11" iso/

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-FUN-11GAMES-V12
        path: KSO-FUN-11GAMES.iso
