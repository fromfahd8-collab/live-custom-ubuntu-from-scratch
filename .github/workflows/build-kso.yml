name: Build KSO FUN - 11 GAMES V19.3 LIVE FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean
    - run: sudo apt-get update -qq && sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git fdisk xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch libretro-* linux-generic casper -qq
    - run: |
        set -e
        sudo rm -rf rootfs /tmp/kso_games
        sudo mkdir -p rootfs
        cd rootfs
        
        sudo mkdir -p usr/share/plymouth/themes/kso etc/alternatives usr/bin etc/skel/.config/i3 etc/skel/.minetest
        
        cat > /tmp/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        EOF
        sudo mv /tmp/kso.plymouth usr/share/plymouth/themes/kso/kso.plymouth
        sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth etc/alternatives/default.plymouth

        echo 'exec i3' | sudo tee etc/skel/.xinitrc > /dev/null
        
        echo 'systemctl poweroff' | sudo tee usr/bin/kso-shutdown > /dev/null
        sudo chmod +x usr/bin/kso-shutdown
        cat > /tmp/i3config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        bindsym $mod+g exec retroarch
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        EOF
        sudo mv /tmp/i3config etc/skel/.config/i3/config

        cat > /tmp/minetest.conf << 'EOF'
        video_driver = opengl
        fps_max = 60
        EOF
        sudo mv /tmp/minetest.conf etc/skel/.minetest/minetest.conf

        sudo mkdir -p /tmp/kso_games/psx /tmp/kso_games/snes /tmp/kso_games/gba /tmp/kso_games/arcade
        # 1. PSX: 3 العاب مضمونة
        cd /tmp/kso_games/psx && sudo chmod 777 . && wget -q https://archive.org/download/PSX-Homebrew-Demos/PSXDoom.PBP -O Doom.PBP
        cd /tmp/kso_games/psx && sudo chmod 777 . && wget -q https://archive.org/download/PSX-Homebrew-Demos/Duke3D.PBP -O Duke3D.PBP
        cd /tmp/kso_games/psx && sudo chmod 777 . && wget -q https://archive.org/download/PSX-Homebrew-Demos/Wolfenstein3D.PBP -O Wolf3D.PBP
        # 2. SNES: 3 العاب مضمونة 
        cd /tmp/kso_games/snes && sudo chmod 777 . && wget -q https://archive.org/download/snes-homebrew/SNES-Tetris.sfc -O Tetris.sfc
        cd /tmp/kso_games/snes && sudo chmod 777 . && wget -q https://archive.org/download/snes-homebrew/SuperMarioWorld.sfc -O Mario.sfc
        cd /tmp/kso_games/snes && sudo chmod 777 . && wget -q https://archive.org/download/snes-homebrew/StreetFighter2.sfc -O SF2.sfc
        # 3. GBA: 2 لعبة مضمونة
        cd /tmp/kso_games/gba && sudo chmod 777 . && wget -q https://archive.org/download/gba-homebrew/CaveStory.gba -O CaveStory.gba
        cd /tmp/kso_games/gba && sudo chmod 777 . && wget -q https://archive.org/download/gba-homebrew/2048.gba -O 2048.gba
        # 4. Arcade: 2 لعبة مضمونة
        cd /tmp/kso_games/arcade && sudo chmod 777 . && wget -q https://archive.org/download/mame-0.259-roms/arkanoid.zip -O Arkanoid.zip
        cd /tmp/kso_games/arcade && sudo chmod 777 . && wget -q https://archive.org/download/mame-0.259-roms/pacman.zip -O Pacman.zip
        # 5. PC
        # Minetest بينزل من apt
        
        cd $GITHUB_WORKSPACE/rootfs
        sudo mkdir -p usr/share/games/kso
        sudo cp -r /tmp/kso_games/* usr/share/games/kso/
        sudo mksquashfs . filesystem.squashfs -comp xz
    - run: |
        sudo mkdir -p isohybrid && sudo cp /boot/vmlinuz-* isohybrid/vmlinuz && sudo cp /boot/initrd.img-* isohybrid/initrd && sudo cp filesystem.squashfs isohybrid/
        echo 'menuentry "KSO" { linux /vmlinuz boot=casper }' | sudo tee isohybrid/grub.cfg
        sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi isohybrid/BOOTX64.EFI
        sudo xorriso -as mkisofs -o KSO-FUN-LIVE.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e BOOTX64.EFI -no-emul-boot -graft-points /boot/grub= isohybrid/ /casper/filesystem.squashfs=isohybrid/filesystem.squashfs /casper/vmlinuz=isohybrid/vmlinuz /casper/initrd=isohybrid/initrd -V "KSO_LIVE".
    - uses: actions/upload-artifact@v4
      with:
        name: KSO-FUN-LIVE-V19.3
        path: KSO-FUN-LIVE.iso
