name: Build KSO FUN - 11 GAMES V16.7 LIVE FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Maximize Build Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean && df -h

    - name: Install RetroArch + i3 + Minetest + Kernel + Fonts
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y grub-efi-amd64-bin mtools imagemagick squashfs-tools git fdisk xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch libretro-* linux-generic casper -qq

    - name: Build KSO System From Scratch
      run: |
        set -e
        sudo mkdir -p rootfs
        cd rootfs
        
        # === 1. البوت KSO ===
        sudo mkdir -p usr/share/plymouth/themes/kso etc/alternatives
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        [script]
        fun(0.01);
        Window.SetBackgroundTopColor(0.05, 0, 0.2);
        Window.SetBackgroundBottomColor(0, 0, 0);
        kso_logo = Image.Text("KSO", 1, 0.1, 0.8);
        kso_logo_sprite = Sprite(kso_logo);
        kso_logo_sprite.SetX(Window.GetWidth()/2 - kso_logo.GetWidth()/2);
        kso_logo_sprite.SetY(Window.GetHeight()/2 - 150);
        kso_text = Image.Text("برمجة عبد الله و عبد الرحمن هاني", 1, 1, 1);
        kso_text_sprite = Sprite(kso_text);
        kso_text_sprite.SetX(Window.GetWidth()/2 - kso_text.GetWidth()/2);
        kso_text_sprite.SetY(Window.GetHeight()/2 + 20);
        kso_alpha = 0.5; kso_dir = 0.02; kso_logo_sprite.SetOpacity(kso_alpha);
        kso.draw_bg = fun() { kso_alpha = kso_alpha + kso_dir; if(kso_alpha > 1.0 || kso_alpha < 0.3) { kso_dir = -kso_dir; } kso_logo_sprite.SetOpacity(kso_alpha); };' | sudo tee usr/share/plymouth/themes/kso/kso.script
        echo '[Plymouth Theme]
        Name=KSO-GamerOS-FUN
        ModuleName=script' | sudo tee usr/share/plymouth/themes/kso/kso.plymouth
        sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth etc/alternatives/default.plymouth

        # === 2. الخلفية ===
        sudo mkdir -p usr/share/backgrounds
        sudo convert -size 1920x1080 xc:'#0F172A' -fill '#3B82F6' -font DejaVu-Sans -pointsize 120 -gravity center -annotate +0-80 'KSO' -fill white -pointsize 40 -annotate +0+40 'برمجة عبد الله و عبد الرحمن هاني' -fill '#60A5FA' -pointsize 30 -annotate +0+90 '11 GAMES LIVE' usr/share/backgrounds/kso-wall.jpg

        # === 3. i3 + ماوس + Windows+Q ===
        sudo mkdir -p usr/bin etc/skel/.config/i3
        echo '#!/bin/bash
        systemctl poweroff' | sudo tee usr/bin/kso-shutdown && sudo chmod +x usr/bin/kso-shutdown
        echo 'set $mod Mod4
        exec --no-startup-id feh --bg-scale /usr/share/backgrounds/kso-wall.jpg
        exec --no-startup-id xsetroot -cursor_name left_ptr
        bindsym $mod+g exec retroarch
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun -theme gruvbox-dark
        mouse mod1 button1 move
        gaps inner 8
        client.focused #3B82F6 #1E293B #FFFFFF #3B82F6' | sudo tee etc/skel/.config/i3/config

        # === 4. Minetest خفيف ===
        sudo mkdir -p etc/skel/.minetest
        echo 'video_driver = opengl
        enable_shaders = false
        enable_particles = false
        enable_clouds = false
        view_bobbing_amount = 0.0
        fps_max = 60
        render_distance = 50' | sudo tee etc/skel/.minetest/minetest.conf

        # === 5. الـ 11 لعبة ===
        sudo mkdir -p /tmp/kso_games/psx /tmp/kso_games/snes /tmp/kso_games/gba /tmp/kso_games/arcade
        cd /tmp/kso_games
        cd psx && wget -q --tries=3 https://archive.org/download/PSX-Homebrew-Demos/PSXDoom.PBP -O Doom.PBP && wget -q --tries=3 https://archive.org/download/psx-homebrew/DukeNukem.PBP -O Duke.PBP && wget -q --tries=3 https://archive.org/download/psx-homebrew/Wolf3D.PBP -O Wolf3D.PBP
        cd../snes && wget -q --tries=3 https://archive.org/download/snes-homebrew/SNES-Tetris.sfc -O Tetris.sfc && wget -q --tries=3 https://archive.org/download/snes-homebrew/SuperMarioWorld.sfc -O Mario.sfc && wget -q --tries=3 https://archive.org/download/snes-homebrew/StreetFighter2.sfc -O SF2.sfc
        cd../gba && wget -q --tries=3 https://archive.org/download/gba-homebrew/CaveStory.gba -O CaveStory.gba && wget -q --tries=3 https://archive.org/download/gba-homebrew/2004-mine.gba -O Mine.gba
        cd../arcade && wget -q --tries=3 https://archive.org/download/mame-0.259-roms/arkanoid.zip -O Arkanoid.zip && wget -q --tries=3 https://archive.org/download/mame-0.259-roms/pacman.zip -O Pacman.zip
        
        cd $GITHUB_WORKSPACE/rootfs
        sudo mkdir -p usr/share/games/kso
        sudo cp -r /tmp/kso_games/* usr/share/games/kso/

    - name: Make LIVE ISO
      run: |
        sudo mkdir -p iso/boot/grub iso/casper # <- هنا حطيت sudo
        sudo cp /boot/vmlinuz-* iso/casper/vmlinuz # <- وهنا
        sudo cp /boot/initrd.img-* iso/casper/initrd # <- وهنا
        sudo mksquashfs rootfs iso/casper/filesystem.squashfs -comp xz -b 1024K
        echo 'set timeout=3
        menuentry "KSO-GamerOS LIVE 11 GAMES" {
          linux /casper/vmlinuz boot=casper quiet splash
          initrd /casper/initrd
        }' | sudo tee iso/boot/grub/grub.cfg
        sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/boot/grub/BOOTX64.EFI
        sudo xorriso -as mkisofs -o KSO-FUN-LIVE.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e boot/grub/BOOTX64.EFI -no-emul-boot -V "KSO_LIVE" iso/

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-FUN-LIVE-V16.7
        path: KSO-FUN-LIVE.iso
