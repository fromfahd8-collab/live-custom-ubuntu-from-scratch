name: Build KSO FUN - 11 GAMES V20.4 FINAL FIX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean

    - name: Install Tools
      run: sudo apt-get update -qq && sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git fdisk xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch libretro-* linux-generic casper -qq

    - name: Build RootFS + Download 11 Games
      run: |
        set -e
        sudo rm -rf rootfs /tmp/kso_games
        sudo mkdir -p rootfs
        cd rootfs
        
        sudo mkdir -p usr/share/plymouth/themes/kso etc/alternatives usr/bin etc/skel/.config/i3 etc/skel/.minetest
        
        cat > /tmp/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-GamerOS-FUN
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        EOF
        sudo mv /tmp/kso.plymouth usr/share/plymouth/themes/kso/kso.plymouth
        sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth etc/alternatives/default.plymouth

        echo 'exec i3' | sudo tee etc/skel/.xinitrc > /dev/null
        echo 'systemctl poweroff' | sudo tee usr/bin/kso-shutdown > /dev/null
        sudo chmod +x usr/bin/kso-shutdown
        cat > /tmp/i3config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        bindsym $mod+g exec retroarch
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        EOF
        sudo mv /tmp/i3config etc/skel/.config/i3/config

        cat > /tmp/minetest.conf << 'EOF'
        video_driver = opengl
        fps_max = 60
        EOF
        sudo mv /tmp/minetest.conf etc/skel/.minetest/minetest.conf

        # ========= تحميل الالعاب بدون Permission denied =========
        set +e 
        mkdir -p /tmp/kso_games/psx /tmp/kso_games/snes /tmp/kso_games/gba /tmp/kso_games/arcade
        chmod -R 777 /tmp/kso_games
        cd /tmp/kso_games
        
        download() { for i in 1 2 3; do wget -T 15 -t 1 -q $1 -O $2 && return 0 || sleep 2; done; wget -T 15 -t 1 -q $3 -O $2 || return 0; }
        
        # 1. PSX: 3 العاب
        download "https://archive.org/download/PSX-Homebrew-Demos/PSXDoom.PBP" "psx/Doom.PBP" "https://archive.org/download/psx-homebrew/PSXDoom.PBP"
        download "https://archive.org/download/PSX-Homebrew-Demos/Duke3D.PBP" "psx/Duke3D.PBP" "https://archive.org/download/psx-homebrew/Duke3D.PBP"
        download "https://archive.org/download/PSX-Homebrew-Demos/Wolfenstein3D.PBP" "psx/Wolfenstein3D.PBP" "https://archive.org/download/psx-homebrew/Wolfenstein3D.PBP"
        # 2. SNES: 3 العاب 
        download "https://archive.org/download/snes-homebrew/SNES-Tetris.sfc" "snes/Tetris.sfc" "https://archive.org/download/snes-no-intro-2021/Tetris.sfc"
        download "https://archive.org/download/snes-homebrew/SuperMarioWorld.sfc" "snes/Mario.sfc" "https://archive.org/download/snes-no-intro-2021/Super_Mario_World.sfc"
        download "https://archive.org/download/snes-homebrew/StreetFighter2.sfc" "snes/SF2.sfc" "https://archive.org/download/snes-no-intro-2021/Street_Fighter_II.sfc"
        # 3. GBA: 2 لعبة
        download "https://archive.org/download/gba-homebrew/CaveStory.gba" "gba/CaveStory.gba" "https://archive.org/download/gba-homebrew-2/CaveStory.gba"
        download "https://archive.org/download/gba-homebrew/2048.gba" "gba/2048.gba" "https://archive.org/download/gba-homebrew-2/2048.gba"
        # 4. Arcade: 2 لعبة 
        download "https://archive.org/download/mame-0.259-roms/arkanoid.zip" "arcade/Arkanoid.zip" "https://archive.org/download/mame-2003-roms/arkanoid.zip"
        download "https://archive.org/download/mame-0.259-roms/pacman.zip" "arcade/Pacman.zip" "https://archive.org/download/mame-2003-roms/pacman.zip"
        set -e
        
        # ========= تقرير كامل =========
        echo "====== KSO GAME REPORT V20.4 ======"
        find /tmp/kso_games -type f -printf "%s bytes  %p\n" | sort
        echo "SUCCESS:" $(find /tmp/kso_games -type f | wc -l) "/ 11"
        echo "MISSING:" $(find /tmp/kso_games -type f | wc -l | xargs -I {} echo $((11-{})))
        echo "==================================="
        
        cd $GITHUB_WORKSPACE/rootfs
        sudo mkdir -p usr/share/games/kso
        sudo cp -r /tmp/kso_games/* usr/share/games/kso/
        sudo mksquashfs . filesystem.squashfs -comp xz

    - name: Create ISO - V20.4 FIX
      run: |
        sudo rm -f isohybrid
        sudo rm -rf isohybrid 
        sudo mkdir isohybrid
        ls -ld isohybrid
        
        # <== الحل: نجيب اسم الكيرنل والرام ديسك الصح اوتوماتيك
        KERNEL=$(ls /boot/vmlinuz-* | head -n 1)
        INITRD=$(ls /boot/initrd.img-* | head -n 1)
        echo "Using KERNEL: $KERNEL"
        echo "Using INITRD: $INITRD"
        
        sudo cp $KERNEL isohybrid/vmlinuz
        sudo cp $INITRD isohybrid/initrd 
        sudo cp filesystem.squashfs isohybrid/
        
        echo 'menuentry "KSO" { linux /vmlinuz boot=casper quiet splash }' | sudo tee isohybrid/grub.cfg
        sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi isohybrid/BOOTX64.EFI
        sudo xorriso -as mkisofs -o KSO-FUN-LIVE.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e BOOTX64.EFI -no-emul-boot -graft-points /boot/grub= isohybrid/ /casper/filesystem.squashfs=isohybrid/filesystem.squashfs /casper/vmlinuz=isohybrid/vmlinuz /casper/initrd=isohybrid/initrd -V "KSO_LIVE".

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-FUN-LIVE-V20.4
        path: KSO-FUN-LIVE.iso
