name: Build KSO-GamerOS PRO 101 - Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget p7zip-full grub-efi-amd64-bin mtools squashfs-tools aria2 git fdisk grub-pc-bin xorriso curl psmisc

      - name: Download Batocera - Auto Latest File
        run: |
          set -e
          echo "بجيب آخر إصدار من الميرور الرسمي..."

          BASE_URL="https://mirrors.o2switch.fr/batocera/x86_64/stable/last/"
          LATEST_FILE=$(curl -s $BASE_URL | grep -o 'href="batocera-x86_64-[^"]*\.img\.gz"' | head -1 | cut -d'"' -f2)

          if [ -z "$LATEST_FILE" ]; then
            echo "ملقتش ملف، بجرب اسم افتراضي"
            LATEST_FILE="batocera-x86_64.img.gz"
          fi

          FULL_URL="${BASE_URL}${LATEST_FILE}"
          echo "اللينك: $FULL_URL"

          curl -L --retry 10 --retry-delay 5 -o batocera.img.gz "$FULL_URL"

          FILE_SIZE=$(stat -c%s "batocera.img.gz")
          echo "حجم الملف: $FILE_SIZE بايت"

          if [ "$FILE_SIZE" -lt 500000000 ]; then
            echo "Error: الملف بايظ"
            head -c 500 batocera.img.gz
            exit 1
          fi

          echo "بفك الضغط..."
          gunzip batocera.img.gz

          if [ -f batocera-x86_64.img ]; then
            mv batocera-x86_64.img batocera.img
          fi

          ls -lh batocera.img

      - name: Mount IMG and Add KSO Branding + Games + Config
        run: |
          set -e
          mkdir -p /tmp/work

          offset=$(fdisk -l batocera.img | grep 'batocera.img2' | awk '{print $2*512}')
          echo "الـ offset: $offset"

          mkdir -p /tmp/work/mnt
          sudo mount -o loop,offset=$offset batocera.img /tmp/work/mnt

          # 1. براندنج برمجة عبد الله و عبد الرحمن هاني [ kso ]
          echo "بحط ثيم [ kso ]..."
          sudo mkdir -p /tmp/work/mnt/usr/share/plymouth/themes/kso
          sudo mkdir -p /tmp/work/mnt/etc/alternatives

          cat << 'EOF' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.plymouth
          [Plymouth Theme]
          Name=KSO-GamerOS-PRO-101
          Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          ModuleName=script

          [script]
          ScriptFile=/usr/share/plymouth/themes/kso/kso.script
          EOF

          cat << 'EOF' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.script
          Window.SetBackgroundTopColor(0,0,0);
          Window.SetBackgroundBottomColor(0,0,0);
          text = Image.Text("برمجة عبد الله و عبد الرحمن هاني [ kso ] - 101 لعبة", 1, 1, 1);
          text_sprite = Sprite(text);
          text_sprite.SetPosition(Window.GetWidth()/2 - text.GetWidth()/2, Window.GetHeight()/2);
          EOF

          sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth /tmp/work/mnt/etc/alternatives/default.plymouth
          echo "خلصت البراندنج"

          # 2. تحميل 101 لعبة
          set +e
          echo "بحمل الألعاب..."
          sudo mkdir -p /tmp/work/mnt/userdata/roms/psx /tmp/work/mnt/userdata/roms/snes /tmp/work/mnt/userdata/roms/gba

          # === PS1 - 36 لعبة - متصلح بـ.cue +.bin ===
          cd /tmp/work/mnt/userdata/roms/psx
