          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/gpio/gpio.gba -O "25-GPIO.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/camera/camera.gba -O "26-Camera.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/rumble/rumble.gba -O "27-Rumble.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/sensor/sensor.gba -O "28-Sensor.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/bitmap/bitmap.gba -O "29-Bitmap.gba" || true
          sudo wget -q https://github.com/terasology-lite/gba/releases/download/v0.1/terasology.gba -O "30-Terasology-Lite-GBA.gba" || true

          # 3. Config
          echo "بحط الكونفج..."
          sudo mkdir -p /tmp/work/mnt/userdata/system
          echo 'global.theme=carbon
          system.hostname=KSO-GamerOS-PRO101
          updates.enabled=0
          global.bezel=none
          kso.games=101
          kso.version=PRO-101
          kso.author=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          global.netplay=0' | sudo tee /tmp/work/mnt/userdata/system/batocera.conf

          # 4. فك الـ Mount - متصلح
          echo "بفك الـ Mount..."
          cd /
          sync
          sleep 5
          sudo fuser -km /tmp/work/mnt 2>/dev/null || true
          sleep 2
          sudo umount -l /tmp/work/mnt || sudo umount -f /tmp/work/mnt
          echo "الماونت اتفك تمام"

      - name: Build ISO
        run: |
          mkdir -p iso/EFI/BOOT
          cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
          cp batocera.img iso/batocera.img
          echo 'set timeout=3
          set default=0
          menuentry "KSO-GamerOS-PRO-101 [ kso ]" {
            linux /batocera.img
          }' | sudo tee iso/EFI/BOOT/grub.cfg
          xorriso -as mkisofs -o KSO-GamerOS-PRO-101-3GB-UEFI.iso -iso-level 3 -udf -isohybrid-gpt-basdat -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot -V "KSO_PRO_101" iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KSO-GamerOS-PRO-101-ISO
          path: KSO-GamerOS-PRO-101-3GB-UEFI.iso
          retention-days: 7   
