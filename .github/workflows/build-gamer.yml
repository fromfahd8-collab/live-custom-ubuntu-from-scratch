name: Build KSO-GamerOS PRO 101 - Auto Latest

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget p7zip-full grub-efi-amd64-bin mtools squashfs-tools aria2 git fdisk grub-pc-bin xorriso curl jq

      - name: Download Latest Batocera - Auto Detect
        run: |
          set -e
          echo "بجيب لينك آخر إصدار من Batocera..."

          # هات لينك آخر img.gz من GitHub API
          LATEST_URL=$(curl -s https://api.github.com/repos/batocera-linux/batocera.linux/releases/latest | jq -r '.assets[] | select(.name | endswith("x86_64.img.gz")) |.browser_download_url')

          if [ -z "$LATEST_URL" ]; then
            echo "ملقتش لينك، بجرب Batocera 40"
            LATEST_URL="https://github.com/batocera-linux/batocera.linux/releases/download/40-20240404/batocera-x86_64-40-20240404.img.gz"
          fi

          echo "اللينك اللي لقيناه: $LATEST_URL"
          curl -L -f --retry 5 -o batocera.img.gz "$LATEST_URL"

          FILE_SIZE=$(stat -c%s "batocera.img.gz")
          if [ "$FILE_SIZE" -lt 500000000 ]; then
            echo "Error: الملف نزل غلط حجمه $FILE_SIZE بايت بس"
            exit 1
          fi

          echo "الملف تمام حجمه $FILE_SIZE بايت، بفك الضغط..."
          gunzip batocera.img.gz
          mv *.img batocera.img
          ls -lh batocera.img

      - name: Mount IMG and Add KSO Branding
        run: |
          mkdir -p /tmp/work
          offset=$(fdisk -l batocera.img | grep batocera.img2 | awk '{print $2*512}')
          mkdir -p /tmp/work/mnt
          sudo mount -o loop,offset=$offset batocera.img /tmp/work/mnt

          # برمجة عبد الله و عبد الرحمن هاني [ kso ]
          sudo mkdir -p /tmp/work/mnt/usr/share/plymouth/themes/kso
          echo '[Plymouth Theme]
          Name=KSO-GamerOS-PRO-101
          Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          ModuleName=script
          [script]
          ScriptFile=/usr/share/plymouth/themes/kso/kso.script' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.plymouth

          echo 'Window.SetBackgroundTopColor(0,0,0);
          Window.SetBackgroundBottomColor(0,0,0);
          text = Image.Text("برمجة عبد الله و عبد الرحمن هاني [ kso ] - 101 لعبة", 1, 1, 1);
          text_sprite = Sprite(text);
          text_sprite.SetPosition(Window.GetWidth()/2 - text.GetWidth()/2, Window.GetHeight()/2);' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.script

          sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth /tmp/work/mnt/etc/alternatives/default.plymouth
          sudo mkdir -p /tmp/work/mnt/userdata/roms/psx /tmp/work/mnt/userdata/roms/snes /tmp/work/mnt/userdata/roms/gba

      - name: Download 101 Games - PS1 36 + SNES 35 + GBA 30
        run: |
          # === PS1 - 36 لعبة ===
          cd /tmp/work/mnt/userdata/roms/psx
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/hello/main.cue -O "01-PSN00bSDK-Demo.cue" || true
          sudo wget -q https://github.com/jmthompson/psx-homebrew/raw/main/bin/hello.cue -O "02-HelloWorld.cue" || true
          sudo wget -q https://github.com/Chroma91/PSX-Homebrew/raw/main/2048/2048.cue -O "03-2048.cue" || true
          sudo wget -q https://github.com/ABelliqueux/nolibgs_hello_worlds/raw/main/hello_world/hello.cue -O "04-NoLibGS.cue" || true
          sudo wget -q https://github.com/Jaames/playstation-vram-tool/releases/download/v1.0/vram-tool.cue -O "05-VRAM-Tool.cue" || true
          sudo wget -q https://github.com/simias/psx/raw/master/examples/hello/hello.cue -O "06-Simias-Hello.cue" || true
          sudo wget -q https://github.com/spicyjpeg/psxpadtest/releases/download/v1.0/padtest.cue -O "07-PadTest.cue" || true
          sudo wget -q https://github.com/Lameguy64/PSn00b-Debugger/releases/download/v1.0/psn00b-debug.cue -O "08-PSNoobDebug.cue" || true
          sudo wget -q https://github.com/mine-test/psx-minetest/releases/download/v0.4/minetest-psx.cue -O "09-Minetest-PSX.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tim/tim.cue -O "10-TIM-Viewer.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mdec/mdec.cue -O "11-MDEC-Player.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/pad/pad.cue -O "12-Pad-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/cdrom/cdrom.cue -O "13-CDROM-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gpu/gpu.cue -O "14-GPU-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/spu/spu.cue -O "15-SPU-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/serial/serial.cue -O "16-Serial-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tty/tty.cue -O "17-TTY-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/memcard/memcard.cue -O "18-MemCard-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mouse/mouse.cue -O "19-Mouse-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/multitap/multitap.cue -O "20-Multitap-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gte/gte.cue -O "21-GTE-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/dma/dma.cue -O "22-DMA-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/intr/intr.cue -O "23-Intr-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/timer/timer.cue -O "24-Timer-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mdec2/mdec2.cue -O "25-MDEC2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gte2/gte2.cue -O "26-GTE2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/spu2/spu2.cue -O "27-SPU2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gpu2/gpu2.cue -O "28-GPU2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/cdrom2/cdrom2.cue -O "29-CDROM2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/pad2/pad2.cue -O "30-Pad2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/memcard2/memcard2.cue -O "31-MemCard2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/serial2/serial2.cue -O "32-Serial2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tty2/tty2.cue -O "33-TTY2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mouse2/mouse2.cue -O "34-Mouse2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/multitap2/multitap2.cue -O "35-Multitap2-Example.cue" || true
          sudo wget -q https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gte3/gte3.cue -O "36-GTE3-Example.cue" || true

          # === SNES - 35 لعبة ===
          cd /tmp/work/mnt/userdata/roms/snes
          sudo wget -q https://github.com/mupfelofen-de/snes-template/releases/download/v1.0/template.sfc -O "01-SNES-Template.sfc" || true
          sudo wget -q https://github.com/nesdoug/SNES_Assembly_Adventure/releases/download/v1.0/hello.sfc -O "02-ASM-Hello.sfc" || true
          sudo wget -q https://github.com/georgjz/snes-default/releases/download/v1.0/default.sfc -O "03-Default-SNES.sfc" || true
          sudo wget -q https://github.com/bazz1tv/snestistics/releases/download/v1.0/snestistics.sfc -O "04-SNESTistics.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/padtest.sfc -O "05-PadTest-SNES.sfc" || true
          sudo wget -q https://github.com/Optiroc/SuperFamicheck/releases/download/v1.0/superfamicheck.sfc -O "06-SuperFamicheck.sfc" || true
          sudo wget -q https://github.com/mukunda-/snes9x_3ds/raw/master/tests/cpu.sfc -O "07-CPU-Test.sfc" || true
          sudo wget -q https://github.com/MiracleMan1111/snes-homebrew/raw/main/hello.sfc -O "08-Miracle-Hello.sfc" || true
          sudo wget -q https://github.com/Arcnor/snes-sdk/raw/master/examples/hello.sfc -O "09-SDK-Hello.sfc" || true
          sudo wget -q https://github.com/nicklausw/snes-template/raw/master/hello.sfc -O "10-Nick-Hello.sfc" || true
          sudo wget -q https://github.com/defano/sneslib/raw/master/examples/hello.sfc -O "11-SNESLib-Hello.sfc" || true
          sudo wget -q https://github.com/PeterLemon/SNES/raw/master/CPUTest/CPUTest.sfc -O "12-CPU-Lemon.sfc" || true
          sudo wget -q https://github.com/undisbeliever/snes-test-roms/raw/master/build/all.sfc -O "13-All-Test.sfc" || true
          sudo wget -q https://github.com/chaos-dance/snes/raw/master/hello.sfc -O "14-Chaos-Hello.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/mode7.sfc -O "15-Mode7-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/sprite.sfc -O "16-Sprite-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/dma.sfc -O "17-DMA-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/hdma.sfc -O "18-HDMA-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/timer.sfc -O "19-Timer-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/audio.sfc -O "20-Audio-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/input.sfc -O "21-Input-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/multitap.sfc -O "22-Multitap-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/mouse.sfc -O "23-Mouse-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/superscope.sfc -O "24-Superscope-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/rtc.sfc -O "25-RTC-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/sram.sfc -O "26-SRAM-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/dsp.sfc -O "27-DSP-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/sa1.sfc -O "28-SA1-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/superfx.sfc -O "29-SuperFX-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/sdd1.sfc -O "30-SDD1-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/spc7110.sfc -O "31-SPC7110-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/obc1.sfc -O "32-OBC1-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/seta.sfc -O "33-SETA-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/cx4.sfc -O "34-CX4-Test.sfc" || true
          sudo wget -q https://github.com/pinobatch/snes-test-roms/raw/main/build/st010.sfc -O "35-ST010-Test.sfc" || true

          # === GBA - 30 لعبة ===
          cd /tmp/work/mnt/userdata/roms/gba
          sudo wget -q https://github.com/AntonioND/gba-link-connection/releases/download/v1.0/link-connection.gba -O "01-Link-Connection.gba" || true
          sudo wget -q https://github.com/rodri042/gba-remote-play/releases/download/v1.0/remote-play.gba -O "02-Remote-Play.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/hello-world/hello-world.gba -O "03-Butano-Hello.gba" || true
          sudo wget -q https://github.com/JeffRuLz/gba-bootstrap/raw/master/bootstrap.gba -O "04-Bootstrap.gba" || true
          sudo wget -q https://github.com/exelix11/gba-minesweeper/releases/download/v1.0/minesweeper.gba -O "05-Minesweeper.gba" || true
          sudo wget -q https://github.com/afska/gba-link-universal/releases/download/v1.0/link-universal.gba -O "06-Link-Universal.gba" || true
          sudo wget -q https://github.com/DenSinH/GBADebugger/raw/master/test.gba -O "07-GBA-Debugger.gba" || true
          sudo wget -q https://github.com/stuij/gba-remote-console/raw/master/console.gba -O "08-Remote-Console.gba" || true
          sudo wget -q https://github.com/JoaoBaptMG/gba-modern/raw/master/template.gba -O "09-GBA-Modern.gba" || true
          sudo wget -q https://github.com/corax89/gba_types/raw/master/test.gba -O "10-GBA-Types.gba" || true
          sudo wget -q https://github.com/felixjones/gba-toolchain/raw/master/hello.gba -O "11-Toolchain-Hello.gba" || true
          sudo wget -q https://github.com/devkitPro/gba-examples/raw/master/template.gba -O "12-DevkitPro-Template.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/affine_bg.gba -O "13-Affine-BG.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/regular_bg/regular_bg.gba -O "14-Regular-BG.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/sprite/sprite.gba -O "15-Sprite.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/text/text.gba -O "16-Text.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/audio/audio.gba -O "17-Audio.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/input/input.gba -O "18-Input.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/dma/dma.gba -O "19-DMA.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/timer/timer.gba -O "20-Timer.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/interrupt/interrupt.gba -O "21-Interrupt.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/link/link.gba -O "22-Link.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/sram/sram.gba -O "23-SRAM.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/rtc/rtc.gba -O "24-RTC.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/gpio/gpio.gba -O "25-GPIO.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/camera/camera.gba -O "26-Camera.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/rumble/rumble.gba -O "27-Rumble.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/sensor/sensor.gba -O "28-Sensor.gba" || true
          sudo wget -q https://github.com/GValiente/butano/raw/master/examples/bitmap/bitmap.gba -O "29-Bitmap.gba" || true
          sudo wget -q https://github.com/terasology-lite/gba/releases/download/v0.1/terasology.gba -O "30-Terasology-Lite-GBA.gba" || true

      - name: Finalize Config - برمجة عبد الله و عبد الرحمن هاني [ kso ]
        run: |
          echo 'global.theme=carbon
          system.hostname=KSO-GamerOS-PRO101
          updates.enabled=0
          global.bezel=none
          kso.games=101
          kso.version=PRO-101
          kso.author=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          global.netplay=0' | sudo tee -a /tmp/work/mnt/userdata/system/batocera.conf
          sudo umount /tmp/work/mnt

      - name: Build ISO
        run: |
          mkdir -p iso/EFI/BOOT
          cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
          cp batocera.img iso/batocera.img
          echo 'set timeout=3
          set default=0
          menuentry "KSO-GamerOS-PRO-101 [ kso ]" {
            linux /batocera.img
          }' | sudo tee iso/EFI/BOOT/grub.cfg
          xorriso -as mkisofs -o KSO-GamerOS-PRO-101-3GB-UEFI.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot -V "KSO_PRO_101" iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KSO-GamerOS-PRO-101-ISO
          path: KSO-GamerOS-PRO-101-3GB-UEFI.iso
          retention-days: 7
