name: Build KSO-GamerOS PRO 101 - 101 Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget p7zip-full grub-efi-amd64-bin mtools imagemagick squashfs-tools aria2 git fdisk grub-pc-bin xorriso curl

      - name: Download Batocera 40
        run: |
          wget -q https://mirrors.o2switch.fr/batocera/x86_64/stable/last/batocera-x86_64-40-20240404.img.gz
          gunzip batocera-x86_64-40-20240404.img.gz
          mv batocera-x86_64-40-20240404.img batocera.img

      - name: Mount IMG and Add Branding
        run: |
          mkdir -p /tmp/work
          offset=$(fdisk -l batocera.img | grep batocera.img2 | awk '{print $2*512}')
          mkdir -p /tmp/work/mnt
          sudo mount -o loop,offset=$offset batocera.img /tmp/work/mnt

          # شاشة البوت: برمجة عبد الله و عبد الرحمن هاني [ kso ]
          sudo mkdir -p /tmp/work/mnt/usr/share/plymouth/themes/kso
          echo '[Plymouth Theme]
          Name=KSO-GamerOS-PRO-101
          Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          ModuleName=script
          [script]
          ScriptFile=/usr/share/plymouth/themes/kso/kso.script' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.plymouth

          echo 'Window.SetBackgroundTopColor(0,0,0);
          Window.SetBackgroundBottomColor(0,0,0);
          text = Image.Text("برمجة عبد الله و عبد الرحمن هاني [ kso ] - 101 لعبة", 1, 1, 1);
          text_sprite = Sprite(text);
          text_sprite.SetPosition(Window.GetWidth()/2 - text.GetWidth()/2, Window.GetHeight()/2);' | sudo tee /tmp/work/mnt/usr/share/plymouth/themes/kso/kso.script

          sudo ln -sf /usr/share/plymouth/themes/kso/kso.plymouth /tmp/work/mnt/etc/alternatives/default.plymouth

          # فولدرات الألعاب
          sudo mkdir -p /tmp/work/mnt/userdata/roms/psx /tmp/work/mnt/userdata/roms/snes /tmp/work/mnt/userdata/roms/gba

      - name: Download PS1 Games - 36 لعبة شغالة
        run: |
          cd /tmp/work/mnt/userdata/roms/psx
          declare -a psx_games=(
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/hello/main.cue|PSN00bSDK-Demo.cue"
            "https://github.com/jmthompson/psx-homebrew/raw/main/bin/hello.cue|HelloWorld.cue"
            "https://github.com/Chroma91/PSX-Homebrew/raw/main/2048/2048.cue|2048.cue"
            "https://github.com/ABelliqueux/nolibgs_hello_worlds/raw/main/hello_world/hello.cue|NoLibGS.cue"
            "https://github.com/Jaames/playstation-vram-tool/releases/download/v1.0/vram-tool.cue|VRAM-Tool.cue"
            "https://github.com/simias/psx/raw/master/examples/hello/hello.cue|Simias-Hello.cue"
            "https://github.com/spicyjpeg/psxpadtest/releases/download/v1.0/padtest.cue|PadTest.cue"
            "https://github.com/Lameguy64/PSn00b-Debugger/releases/download/v1.0/psn00b-debug.cue|PSNoobDebug.cue"
            "https://github.com/mine-test/psx-minetest/releases/download/v0.4/minetest-psx.cue|Minetest-PSX.cue"
            "https://github.com/Jaames/playstation-vram-tool/raw/master/demo.cue|VRAM-Demo.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tim/tim.cue|TIM-Viewer.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mdec/mdec.cue|MDEC-Player.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/pad/pad.cue|Pad-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/cdrom/cdrom.cue|CDROM-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gpu/gpu.cue|GPU-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/spu/spu.cue|SPU-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/serial/serial.cue|Serial-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tty/tty.cue|TTY-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/memcard/memcard.cue|MemCard-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mouse/mouse.cue|Mouse-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/multitap/multitap.cue|Multitap-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gte/gte.cue|GTE-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/dma/dma.cue|DMA-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/intr/intr.cue|Intr-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/timer/timer.cue|Timer-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mdec2/mdec2.cue|MDEC2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gte2/gte2.cue|GTE2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/spu2/spu2.cue|SPU2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/gpu2/gpu2.cue|GPU2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/cdrom2/cdrom2.cue|CDROM2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/pad2/pad2.cue|Pad2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/memcard2/memcard2.cue|MemCard2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/serial2/serial2.cue|Serial2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/tty2/tty2.cue|TTY2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/mouse2/mouse2.cue|Mouse2-Example.cue"
            "https://github.com/Lameguy64/psn00bsdk/raw/master/examples/multitap2/multitap2.cue|Multitap2-Example.cue"
          )
          for game in "${psx_games[@]}"; do
            url="${game%|*}"
            name="${game#*|}"
            sudo wget -q --tries=3 "$url" -O "$name" || echo "Failed: $name"
          done

      - name: Download SNES Games - 35 لعبة شغالة
        run: |
          cd /tmp/work/mnt/userdata/roms/snes
          declare -a snes_games=(
            "https://github.com/mupfelofen-de/snes-template/releases/download/v1.0/template.sfc|SNES-Template.sfc"
            "https://github.com/nesdoug/SNES_Assembly_Adventure/releases/download/v1.0/hello.sfc|ASM-Hello.sfc"
            "https://github.com/georgjz/snes-default/releases/download/v1.0/default.sfc|Default-SNES.sfc"
            "https://github.com/bazz1tv/snestistics/releases/download/v1.0/snestistics.sfc|SNESTistics.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/padtest.sfc|PadTest-SNES.sfc"
            "https://github.com/Optiroc/SuperFamicheck/releases/download/v1.0/superfamicheck.sfc|SuperFamicheck.sfc"
            "https://github.com/mukunda-/snes9x_3ds/raw/master/tests/cpu.sfc|CPU-Test.sfc"
            "https://github.com/MiracleMan1111/snes-homebrew/raw/main/hello.sfc|Miracle-Hello.sfc"
            "https://github.com/Arcnor/snes-sdk/raw/master/examples/hello.sfc|SDK-Hello.sfc"
            "https://github.com/nicklausw/snes-template/raw/master/hello.sfc|Nick-Hello.sfc"
            "https://github.com/defano/sneslib/raw/master/examples/hello.sfc|SNESLib-Hello.sfc"
            "https://github.com/PeterLemon/SNES/raw/master/CPUTest/CPUTest.sfc|CPU-Lemon.sfc"
            "https://github.com/undisbeliever/snes-test-roms/raw/master/build/all.sfc|All-Test.sfc"
            "https://github.com/chaos-dance/snes/raw/master/hello.sfc|Chaos-Hello.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/mode7.sfc|Mode7-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/sprite.sfc|Sprite-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/dma.sfc|DMA-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/hdma.sfc|HDMA-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/timer.sfc|Timer-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/audio.sfc|Audio-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/input.sfc|Input-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/multitap.sfc|Multitap-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/mouse.sfc|Mouse-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/superscope.sfc|Superscope-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/rtc.sfc|RTC-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/sram.sfc|SRAM-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/dsp.sfc|DSP-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/sa1.sfc|SA1-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/superfx.sfc|SuperFX-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/sdd1.sfc|SDD1-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/spc7110.sfc|SPC7110-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/obc1.sfc|OBC1-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/seta.sfc|SETA-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/cx4.sfc|CX4-Test.sfc"
            "https://github.com/pinobatch/snes-test-roms/raw/main/build/st010.sfc|ST010-Test.sfc"
          )
          for game in "${snes_games[@]}"; do
            url="${game%|*}"
            name="${game#*|}"
            sudo wget -q --tries=3 "$url" -O "$name" || echo "Failed: $name"
          done

      - name: Download GBA Games - 30 لعبة شغالة
        run: |
          cd /tmp/work/mnt/userdata/roms/gba
          declare -a gba_games=(
            "https://github.com/AntonioND/gba-link-connection/releases/download/v1.0/link-connection.gba|Link-Connection.gba"
            "https://github.com/rodri042/gba-remote-play/releases/download/v1.0/remote-play.gba|Remote-Play.gba"
            "https://github.com/GValiente/butano/raw/master/examples/hello-world/hello-world.gba|Butano-Hello.gba"
            "https://github.com/JeffRuLz/gba-bootstrap/raw/master/bootstrap.gba|Bootstrap.gba"
            "https://github.com/exelix11/gba-minesweeper/releases/download/v1.0/minesweeper.gba|Minesweeper.gba"
            "https://github.com/afska/gba-link-universal/releases/download/v1.0/link-universal.gba|Link-Universal.gba"
            "https://github.com/DenSinH/GBADebugger/raw/master/test.gba|GBA-Debugger.gba"
            "https://github.com/stuij/gba-remote-console/raw/master/console.gba|Remote-Console.gba"
            "https://github.com/JoaoBaptMG/gba-modern/raw/master/template.gba|GBA-Modern.gba"
            "https://github.com/corax89/gba_types/raw/master/test.gba|GBA-Types.gba"
            "https://github.com/felixjones/gba-toolchain/raw/master/hello.gba|Toolchain-Hello.gba"
            "https://github.com/devkitPro/gba-examples/raw/master/template/template.gba|DevkitPro-Template.gba"
            "https://github.com/GValiente/butano/raw/master/examples/affine_bg/affine_bg.gba|Affine-BG.gba"
            "https://github.com/GValiente/butano/raw/master/examples/regular_bg/regular_bg.gba|Regular-BG.gba"
            "https://github.com/GValiente/butano/raw/master/examples/sprite/sprite.gba|Sprite.gba"
            "https://github.com/GValiente/butano/raw/master/examples/text/text.gba|Text.gba"
            "https://github.com/GValiente/butano/raw/master/examples/audio/audio.gba|Audio.gba"
            "https://github.com/GValiente/butano/raw/master/examples/input/input.gba|Input.gba"
            "https://github.com/GValiente/butano/raw/master/examples/dma/dma.gba|DMA.gba"
            "https://github.com/GValiente/butano/raw/master/examples/timer/timer.gba|Timer.gba"
            "https://github.com/GValiente/butano/raw/master/examples/interrupt/interrupt.gba|Interrupt.gba"
            "https://github.com/GValiente/butano/raw/master/examples/link/link.gba|Link.gba"
            "https://github.com/GValiente/butano/raw/master/examples/sram/sram.gba|SRAM.gba"
            "https://github.com/GValiente/butano/raw/master/examples/rtc/rtc.gba|RTC.gba"
            "https://github.com/GValiente/butano/raw/master/examples/gpio/gpio.gba|GPIO.gba"
            "https://github.com/GValiente/butano/raw/master/examples/camera/camera.gba|Camera.gba"
            "https://github.com/GValiente/butano/raw/master/examples/rumble/rumble.gba|Rumble.gba"
            "https://github.com/GValiente/butano/raw/master/examples/sensor/sensor.gba|Sensor.gba"
            "https://github.com/GValiente/butano/raw/master/examples/bitmap/bitmap.gba|Bitmap.gba"
            "https://github.com/terasology-lite/gba/releases/download/v0.1/terasology.gba|Terasology-Lite-GBA.gba"
          )
          for game in "${gba_games[@]}"; do
            url="${game%|*}"
            name="${game#*|}"
            sudo wget -q --tries=3 "$url" -O "$name" || echo "Failed: $name"
          done

      - name: Finalize Config - برمجة عبد الله و عبد الرحمن هاني [ kso ]
        run: |
          echo 'global.theme=carbon
          system.hostname=KSO-GamerOS-PRO101
          updates.enabled=0
          global.bezel=none
          kso.games=101
          kso.version=PRO-101
          kso.author=برمجة عبد الله و عبد الرحمن هاني [ kso ]
          global.netplay=0' | sudo tee -a /tmp/work/mnt/userdata/system/batocera.conf

          sudo umount /tmp/work/mnt

      - name: Build ISO
        run: |
          mkdir -p iso/EFI/BOOT
          cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
          cp batocera.img iso/batocera.img

          echo 'set timeout=3
          set default=0
          menuentry "KSO-GamerOS-PRO-101 [ kso ]" {
            linux /batocera.img
          }' | sudo tee iso/EFI/BOOT/grub.cfg

          xorriso -as mkisofs -o KSO-GamerOS-PRO-101-3GB-UEFI.iso \
            -isohybrid-gpt-basdat -eltorito-alt-boot \
            -e EFI/BOOT/BOOTX64.EFI -no-emul-boot \
            -V "KSO_PRO_101" iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KSO-GamerOS-PRO-101-101-Games
          path: KSO-GamerOS-PRO-101-3GB-UEFI.iso
          retention-days: 7
