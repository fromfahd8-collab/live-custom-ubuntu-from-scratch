name: Build KSO-AbyssOS Horror

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y live-build debootstrap squashfs-tools xorriso wget git unzip espeak sox imagemagick genisoimage -qq

    - name: Setup Build Directory
      run: |
        mkdir -p abyss && cd abyss
        lb config \
          --architecture amd64 \
          --distribution bookworm \
          --archive-areas "main contrib non-free non-free-firmware" \
          --binary-images iso-hybrid \
          --bootappend-live "boot=live components quiet splash hostname=kso-abyss" \
          --debian-installer none \
          --iso-volume "KSO_ABYSS" \
          --iso-application "KSO-AbyssOS" \
          --iso-publisher "KSO"

    - name: Add Packages
      run: |
        cd abyss
        mkdir -p config/package-lists
        cat > config/package-lists/kso.list.chroot << EOF
        i3-wm
        rofi
        pcmanfm
        vlc
        espeak
        sox
        xdotool
        scrot
        feh
        sudo
        plymouth
        plymouth-themes
        xterm
        xdg-utils
        libgl1
        libglu1-mesa
        libsdl2-2.0-0
        EOF

    - name: Create Horror Boot Theme
      run: |
        cd abyss
        mkdir -p config/includes.chroot/usr/share/plymouth/themes/kso-abyss
        cat > config/includes.chroot/usr/share/plymouth/themes/kso-abyss/kso-abyss.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-Abyss
        Description=برمجة بواسطة عبد الله و عبد الرحمن هاني رجب [ kso ]
        ModuleName=script
        EOF
        
        cat > config/includes.chroot/usr/share/plymouth/themes/kso-abyss/kso-abyss.script << 'EOF'
        Window.SetBackgroundTopColor(0,0,0);
        for (i = 0; i < 300; i++) {
          if (i == 50) {
            flash = Image.Text("!!!", 1,1,1);
            flash_sprite = Sprite(flash);
            flash_sprite.SetX(Window.GetWidth()/2);
            flash_sprite.SetY(Window.GetHeight()/2);
          }
        }
        text = Image.Text("برمجة بواسطة عبد الله و عبد الرحمن هاني رجب [ kso ]", 0.8,0,0);
        text_sprite = Sprite(text);
        text_sprite.SetPosition(Window.GetWidth()/2 - text.GetWidth()/2, Window.GetHeight() - 100);
        run = Image.Text("اهرب", 1,0,0);
        run_sprite = Sprite(run);
        run_sprite.SetPosition(Window.GetWidth()/2 - 50, 100);
        EOF

    - name: Add Horror Sounds
      run: |
        cd abyss
        mkdir -p config/includes.chroot/opt/kso-sounds
        echo 'play -n synth 0.3 sine 100 vol 0.4' > config/includes.chroot/opt/kso-sounds/whisper.sh
        echo 'play -n synth 0.15 sine 2000 vol 0.9' > config/includes.chroot/opt/kso-sounds/scream.sh
        echo 'play -n synth 5 sine 60 vol 0.2' > config/includes.chroot/opt/kso-sounds/heartbeat.sh
        chmod +x config/includes.chroot/opt/kso-sounds/*.sh

    - name: Create bin directories
      run: |
        cd abyss
        mkdir -p config/includes.chroot/usr/bin

    - name: Create Jumpscare System
      run: |
        cd abyss
        cat > config/includes.chroot/usr/bin/kso-jumpscare << 'EOF'
        #!/bin/bash
        bash /opt/kso-sounds/heartbeat.sh &
        while true; do
          sleep $((RANDOM % 300 + 120))
          type=$((RANDOM % 4))
          case $type in
            0) scrot /tmp/s.jpg; convert /tmp/s.jpg -fill red -gravity center -pointsize 150 -annotate 0 "لقد رأيتك" /tmp/s2.jpg; feh --fullscreen /tmp/s2.jpg & bash /opt/kso-sounds/scream.sh & sleep 0.15; pkill feh ;;
            1) espeak -v ar -s 120 "وراك" & ;;
            2) for i in {1..30}; do xdotool key F11; sleep 0.1; done ;;
            3) echo "أنا في جهازك" > ~/Desktop/اقرأني.txt; xdg-open ~/Desktop/اقرأني.txt ;;
          esac
        done
        EOF
        chmod +x config/includes.chroot/usr/bin/kso-jumpscare

    - name: Add Shutdown Scripts
      run: |
        cd abyss
        cat > config/includes.chroot/usr/bin/kso-shutdown << 'EOF'
        #!/bin/bash
        espeak -v ar "الوداع" &
        echo "كان يجب ألا تشغلني..."
        sleep 3
        echo "برمجة بواسطة عبد الله و عبد الرحمن هاني رجب [ kso ]"
        systemctl poweroff
        EOF
        echo -e '#!/bin/bash\nsystemctl poweroff' > config/includes.chroot/usr/bin/kso-quickoff
        chmod +x config/includes.chroot/usr/bin/kso-*

    - name: Download Horror Games - روابط شغالة 100%
      run: |
        cd abyss
        mkdir -p config/includes.chroot/opt/kso-games
        cd config/includes.chroot/opt/kso-games
        
        # 1. SCP-087-B - شغال
        wget -q https://github.com/jpcy/SCP-087-B/releases/download/v1.0/scp087b-linux.tar.gz && tar -xf scp087b-linux.tar.gz && mv scp087b "01-SCP087" && rm *.tar.gz
        
        # 2. Gruesome - بديل IMSCARED شغال
        wget -q https://github.com/duckinator/gruesome/releases/download/v0.2.0/gruesome-linux.zip && unzip -q gruesome-linux.zip && mv gruesome "02-Gruesome" && rm *.zip || mkdir "02-Gruesome"
        
        # 3. Slender: The Eight Pages - بديل Anatomy شغال
        wget -q https://github.com/ekunrae/slender/releases/download/v0.9.7/slender-linux.tar.gz && tar -xf slender-linux.tar.gz && mv slender "03-Slender" && rm *.tar.gz || mkdir "03-Slender"
        
        # 4. Spooky's Jump Scare Mansion - رابط جديد شغال
        wget -q https://github.com/LagunaLoire/Spooky-Jump-Scare-Mansion-HD-Renovation/releases/download/v1.0/SJSM-Linux.zip && unzip -q SJSM-Linux.zip && mv "SpookysJumpScareMansion" "04-Spookys" && rm *.zip || mkdir "04-Spookys"
        
        # 5. Cry of Fear - شغال
        wget -q https://github.com/rxdps/cryoffear/releases/download/v1.0/cof-linux.tar.xz && tar -xf cof-linux.tar.xz && mv "CryOfFear" "05-CryOfFear" && rm *.tar.xz || mkdir "05-CryOfFear"
        
        # 6. Endless Sky - بديل Darkwood، خفيف وشغال
        wget -q https://github.com/endless-sky/endless-sky/releases/download/v0.10.6/endless-sky-x86_64-continuous.AppImage && mkdir "06-Forest" && mv endless-sky*.AppImage "06-Forest/forest.AppImage" && chmod +x "06-Forest/forest.AppImage" || mkdir "06-Forest"
        
        # 7. World of Horror - رابط جديد شغال
        wget -q https://github.com/panzi/world-of-horror/releases/download/v1.0/worldofhorror-linux.tar.gz && tar -xf worldofhorror-linux.tar.gz && mv "WorldOfHorror" "07-WOH" && rm *.tar.gz || mkdir "07-WOH"
        
        # 8. Paratopic - بديل شغال
        wget -q https://github.com/AlisterT/paratopic/releases/download/v1.0/paratopic-linux.tar.gz && tar -xf paratopic-linux.tar.gz && mv "Paratopic" "08-Paratopic" && rm *.tar.gz || mkdir "08-Paratopic"
        
        # 9. The Static Speaks My Name - لو الرابط ضرب بيعمل فولدر فاضي
        wget -q --user-agent="Mozilla" https://the-static-speaks-my-name.s3.amazonaws.com/tssmn-linux.zip && unzip -q tssmn-linux.zip && mv "TheStaticSpeaksMyName" "09-Static" && rm *.zip || mkdir "09-Static"
        
        # 10. Buddy Simulator 1984 - لو الرابط ضرب بيعمل فولدر فاضي
        wget -q https://github.com/not-an-aardvark/buddy-simulator/releases/download/v1.0/buddy-linux.tar.gz && tar -xf buddy-linux.tar.gz && mv "BuddySimulator" "10-Buddy" && rm *.tar.gz || mkdir "10-Buddy"

    - name: Create Games Launcher
      run: |
        cd abyss
        cat > config/includes.chroot/usr/bin/kso-games << 'EOF'
        #!/bin/bash
        clear
        echo "=================================================="
        echo " KSO-AbyssOS - اختر كابوسك 💀"
        echo " برمجة بواسطة عبد الله و عبد الرحمن هاني رجب [ kso ]"
        echo "=================================================="
        echo " 1) SCP-087-B - سلالم الموت"
        echo " 2) Gruesome - الرعب التفاعلي"
        echo " 3) Slender - الثمان صفحات"
        echo " 4) Spookys - 1000 غرفة رعب"
        echo " 5) Cry of Fear - مدينة الكوابيس"
        echo " 6) The Forest - الغابة تلتهمك"
        echo " 7) World of Horror - مانجا ملعونة"
        echo " 8) Paratopic - VHS من الجحيم"
        echo " 9) Static - 5 دقايق وهتتجنن"
        echo "10) Buddy Sim - صاحبك المجنون"
        echo " 0) اهرب لو تقدر"
        read -p "اختيارك: " c
        case $c in
          1) cd /opt/kso-games/01-SCP087 && ./scp087b ;;
          2) cd /opt/kso-games/02-Gruesome && ./gruesome || echo "اللعبة غير متوفرة" ;;
          3) cd /opt/kso-games/03-Slender && ./slender || echo "اللعبة غير متوفرة" ;;
          4) cd /opt/kso-games/04-Spookys && ./SJSM.x86_64 || echo "اللعبة غير متوفرة" ;;
          5) cd /opt/kso-games/05-CryOfFear && ./cryoffear || echo "اللعبة غير متوفرة" ;;
          6) cd /opt/kso-games/06-Forest && ./forest.AppImage || echo "اللعبة غير متوفرة" ;;
          7) cd /opt/kso-games/07-WOH && ./worldofhorror || echo "اللعبة غير متوفرة" ;;
          8) cd /opt/kso-games/08-Paratopic && ./paratopic.x86_64 || echo "اللعبة غير متوفرة" ;;
          9) cd /opt/kso-games/09-Static && ./TheStaticSpeaksMyName || echo "اللعبة غير متوفرة" ;;
          10) cd /opt/kso-games/10-Buddy && ./buddy || echo "اللعبة غير متوفرة" ;;
          0) exit ;;
        esac
        EOF
        chmod +x config/includes.chroot/usr/bin/kso-games

    - name: Setup i3 Horror Desktop + Easy Shutdown
      run: |
        cd abyss
        mkdir -p config/includes.chroot/etc/skel/.config/i3
        cat > config/includes.chroot/etc/skel/.config/i3/config << 'EOF'
        set $mod Mod4
        exec --no-startup-id bash -c "sleep 5 && espeak -v ar 'لقد استيقظ' && kso-jumpscare &"
        exec --no-startup-id bash -c "sleep 8 && xterm -hold -fg red -bg black -e 'echo KSO-AbyssOS Activated && echo برمجة بواسطة عبد الله و عبد الرحمن هاني رجب [ kso ] && echo أنت لست وحدك هنا... && echo Windows+G للرعب | Windows+X قفل سريع | Windows+Q قفل مع وداع'"
        bindsym $mod+Return exec xterm -fg red -bg black
        bindsym $mod+g exec xterm -fg red -bg black -e kso-games
        bindsym $mod+k exec pkill -f kso-jumpscare && sleep 600 && kso-jumpscare &
        bindsym $mod+s exec bash /opt/kso-sounds/scream.sh
        bindsym $mod+x exec kso-quickoff
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+Shift+e exec kso-shutdown
        bar { status_command echo "KSO-WATCHING | Win+X=OFF" colors { background #000000 border #FF0000 text #FF0000 } }
        client.focused #FF0000 #000000 #FF0000
        EOF
        
        mkdir -p config/includes.chroot/etc/sudoers.d
        echo 'live ALL=(ALL) NOPASSWD: /usr/bin/systemctl poweroff, /usr/bin/kso-shutdown, /usr/bin/kso-quickoff' > config/includes.chroot/etc/sudoers.d/kso-nopasswd
        chmod 0440 config/includes.chroot/etc/sudoers.d/kso-nopasswd

    - name: Fix xorriso UDF Issue + Build
      run: |
        cd abyss
        mkdir -p config/hooks/normal
        echo 'plymouth-set-default-theme kso-abyss' > config/hooks/normal/0999-kso-theme.chroot
        echo 'echo "kso-abyss" > /etc/hostname' >> config/hooks/normal/0999-kso-theme.chroot
        chmod +x config/hooks/normal/0999-kso-theme.chroot
        
        # Fix الـ -udf error زي النسخة اللي فاتت
        sed -i 's/--udf//g' /usr/share/live-build/scripts/build/binary_iso
        
        lb build
        mv live-image-amd64.hybrid.iso ../KSO-AbyssOS.iso

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-AbyssOS-ISO
        path: KSO-AbyssOS.iso
